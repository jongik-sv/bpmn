version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: bpmn_editor
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - bpmn-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bpmn-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
      - "1234:1234"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=1234
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/bpmn_editor?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production-jwt-secret-key-change-this
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - bpmn-network

  # Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:1234
      - NEXT_PUBLIC_APP_NAME=BPMN Collaborative Editor
    depends_on:
      - backend
    networks:
      - bpmn-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bpmn-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  bpmn-network:
    driver: bridge